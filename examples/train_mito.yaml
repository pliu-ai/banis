# BANIS Training Configuration for Mitochondria Segmentation
# This is an example configuration file showing best practices

# Data configuration
data:
  # Dataset definitions
  datasets:
    - name: betaSeg
      resolution: [16, 16, 16]  # z, y, x in nm
      path: /projects/weilab/dataset/MitoLE/betaSeg
      train_splits: ["high_c3", "low_c1", "low_c2"]
      val_splits: ["high_c1"]
      test_splits: ["high_c2", "high_c4", "low_c3"]
    
    - name: han24
      resolution: [30, 8, 8]
      path: /projects/weilab/dataset/MitoLE/han24
      train_splits: ["neg0", "pos0"]
      val_splits: ["pos2"]
      test_splits: ["neg1", "pos1"]
  
  # Data paths
  base_data_path: ./mito_data
  real_data_path: null  # Optional: path to real data for mixed training
  
  # Patch sampling
  small_size: 128  # Patch size for training
  long_range: 10   # Long-range affinity offset
  
  # Data loading
  num_workers: 8
  pin_memory: true
  prefetch_factor: 2
  
  # Data augmentation
  augment: true
  drop_slice_prob: 0.05    # Probability of dropping slices
  shift_slice_prob: 0.05   # Probability of shifting slices
  shift_magnitude: 10      # Shift magnitude in voxels
  
  # Intensity augmentation
  intensity_aug: true
  noise_scale: 0.5
  mul_intensity: 0.1
  add_intensity: 0.1
  
  # Geometric augmentation
  affine_prob: 0.5
  affine_scale: 0.2
  affine_shear: 0.5
  
  # Training data composition
  synthetic_ratio: 1.0  # 1.0 = all synthetic, 0.0 = all real

# Training configuration
training:
  # Experiment settings
  exp_name: ""  # Auto-generated if empty
  save_path: ./outputs
  seed: 0
  
  # Training hyperparameters
  batch_size: 8
  n_steps: 50000
  learning_rate: 0.001
  weight_decay: 0.01
  
  # Learning rate scheduling
  use_scheduler: true
  scheduler_type: cosine  # Options: cosine, step, plateau, none
  
  # Validation
  val_check_interval: 5000
  limit_val_batches: 100
  
  # Logging
  log_every_n_steps: 100
  
  # Gradient settings
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  
  # Precision
  precision: "16-mixed"  # Options: 32, 16-mixed, bf16-mixed
  
  # Distributed training
  distributed: false
  devices: -1  # -1 for all available GPUs
  num_nodes: 1
  
  # Checkpointing
  save_top_k: 3
  save_last: true
  resume_from_checkpoint: null  # Path to checkpoint to resume from
  
  # Advanced settings
  compile_model: true
  detect_anomaly: false
  profiler: simple  # Options: simple, advanced, null
  fast_dev_run: 0   # For debugging: run N batches only
  
  # External validation (for long Slurm jobs)
  validate_extern: false
  auto_resubmit: false

# Model configuration
model:
  # Architecture
  architecture: mednext
  model_id: S  # Options: S (small), M (medium), L (large)
  kernel_size: 3  # Options: 3, 5, 7
  num_input_channels: 1  # Auto-determined from data
  num_output_channels: 6  # 3 short + 3 long range affinities
  
  # SDT (Signed Distance Transform) prediction
  predict_sdt: false
  sdt_loss_weight: 1.0
  
  # Evaluation thresholds
  eval_thresholds:
    - 0.4502
    - 0.4741
    - 0.4966
    - 0.5182
    - 0.5388
    - 0.5584
    - 0.5769
    - 0.5945
    - 0.6111
    - 0.6267
    - 0.6413
    - 0.6551
    - 0.6680

