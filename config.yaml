    #- "neg_guidance"
    #- "no_touch_thick"
    #- "pos_guidance"
    #- "slice_perturbed"
    #- "touching_thin"
    - "train_100"
  base_data_path:
    - "/cajal/nvmescratch/projects/NISB/"
  save_path:
    #- "/cajal/scratch/projects/misc/riegerfr/aff_nis/"
    - "/cajal/scratch/projects/misc/zuzur/xl_banis"
  exp_name:
    - "xl_test"
  real_data_path: #https://colab.research.google.com/github/funkelab/lsd/blob/master/lsd/tutorial/notebooks/lsd_data_download.ipynb
    - "/cajal/scratch/projects/misc/mdraw/data/funke/zebrafinch/training/"
  auto_resubmit:
    - True
  distributed:
    - True
  compile:
    - False
  validate_extern:
    - True
mito:
  data_path: ./mito_data
  settings:
    - name: betaSeg
      resolution: [16, 16, 16]
      path: /projects/weilab/dataset/MitoLE/betaSeg
      train: ["high_c3", "low_c1", "low_c2"]
      test: ["high_c2", "high_c4", "low_c3"]
      val: ["high_c1"]
    - name: han24
      resolution: [30, 8, 8]
      path: /projects/weilab/dataset/MitoLE/han24
      train: ["neg0", "pos0"]
      test: ["neg1", "pos1"]
      val: ["pos2"]

