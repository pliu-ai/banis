  long_range:
    - 10
  batch_size:
    - 1
  scheduler:
    - true
  model_id:
    - "L"
  kernel_size:
    - 5
  synthetic:
    - 1.0
  drop_slice_prob:
    - 0.05
  shift_slice_prob:
    - 0.05
  intensity_aug:
    - true
  noise_scale:
    - 0.5
  affine:
    - 0.5
  n_steps:
    - 1_000_000
  small_size:
    - 256
